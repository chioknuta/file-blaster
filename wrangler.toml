# Cloudflare Pages config — binds the D1 leaderboard database to the Pages
# Functions in functions/. Static site output is the repo root.
name = "file-blaster"
pages_build_output_dir = "."
compatibility_date = "2024-11-01"

[[d1_databases]]
binding = "DB"
database_name = "fileblaster-db"
database_id = "b7fa129b-b37f-4b41-b1c6-b52d959e0efb"
